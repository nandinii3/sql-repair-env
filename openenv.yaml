name: sql-repair-env
version: "1.0.0"
description: >
  An RL environment where an AI agent repairs broken SQL queries against
  a live in-memory SQLite database. Tasks range from simple syntax fixes
  to complex window-function and JOIN logic bugs. The agent receives
  partial-progress rewards and feedback on every attempt.
author: "nandini"
tags:
  - sql
  - code-repair
  - data-engineering
  - real-world
  - sqlite
benchmark: sql-repair-env

tasks:
  - id: syntax_fix
    difficulty: easy
    description: >
      Fix a missing comma between column names in a SELECT statement.
      The query must return all employees from the Engineering department.
    max_steps: 3
    reward_range: [0.0, 1.0]

  - id: logic_fix
    difficulty: medium
    description: >
      Fix two logical bugs: replace INNER JOIN with LEFT JOIN so customers
      with no completed orders are not silently dropped, and correct the
      status filter from 'complete' to 'completed'. Must return all 5
      customers including those with zero completed order totals.
    max_steps: 3
    reward_range: [0.0, 1.0]

  - id: optimization_fix
    difficulty: hard
    description: >
      Fix a CTE-based ranking query that returns top-2 employees by total
      compensation per department. Two independent bugs must both be fixed:
      INNER JOIN must become LEFT JOIN + COALESCE (to include employees with
      no bonus rows), and RANK() must become DENSE_RANK() (to correctly
      handle ties). Fixing only one bug produces a different wrong row count.
    max_steps: 3
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  fields:
    - name: task_id
      type: string
      description: Identifier of the current task
    - name: difficulty
      type: string
      description: "Task difficulty: easy | medium | hard"
    - name: task_description
      type: string
      description: Natural-language description of what needs to be fixed
    - name: schema_ddl
      type: string
      description: CREATE TABLE statements defining the database schema
    - name: broken_query
      type: string
      description: The SQL query the agent must repair
    - name: expected_row_count
      type: integer
      description: Number of rows the correct query must return
    - name: attempt
      type: integer
      description: Current attempt number (0 on reset, 1–3 during episode)
    - name: feedback
      type: string
      description: >
        Result of the last attempt. Empty string on reset.
        Examples: "SQL error: no such column: salry",
                  "Got 3 rows, expected 5", "Correct."

action_space:
  type: object
  fields:
    - name: fixed_query
      type: string
      description: The agent's proposed corrected SQL query

reward_range: [0.0, 1.0]

reward_description: >
  Rewards are shaped to provide signal at every step:
    0.0 — query contains forbidden DDL/DML keywords (DROP, DELETE, etc.)
    0.1 — query fails to parse or raises a runtime SQL error
    0.4 — query executes but returns the wrong number of rows
    0.7 — correct answer reached on attempt 3 (or structural penalty on task 3)
    0.85 — correct answer reached on attempt 2
    1.0  — correct answer on the first attempt

episode_config:
  max_steps: 3
  success_threshold: 0.7

endpoints:
  reset: "POST /reset"
  step:  "POST /step"
  state: "GET  /state"
  health: "GET  /health"
  tasks: "GET  /tasks"